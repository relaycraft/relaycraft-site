name: Refresh Plugin Data

on:
  workflow_dispatch: # Manual trigger button in Actions tab
  # Uncomment below to auto-refresh on a schedule
  # schedule:
  #   - cron: '0 6 * * 1' # Every Monday 6:00 UTC

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Redeploy
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
